#SPDX-License-Identifier: MIT-0
---
# defaults file for fortune-mod

packages_redhat:
  - gcc-c++
  - recode
  - recode-devel
  - cmake
  - libcmocka
  - libcmocka-devel
  - perl-autodie
  # optional for testing
  # - perl-File-Find-Object
  # - perl-Test-Differences
  # - perl-Path-Tiny
  # - perl-Test-Valgrind
packages_debian:
  - make
  - g++
  - librecode0
  - librecode-dev
  - cmake
  - libcmocka0
  - libcmocka-dev

dest_dir: "~/fortune-mod"
release: "fortune-mod-3.24.0"
file_extension: ".tar.xz"
build_dir: "{{ dest_dir }}/{{ release }}/build"
download_url: "https://github.com/shlomif/fortune-mod/releases/download/{{ release }}/{{ release }}{{ file_extension }}"
